<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Тренажёр ООП — билеты 2026</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 12% 10%, rgba(139,92,246,.28), transparent 32rem), #0b1020;
      color: #edf2ff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    .loader {
      width: min(560px, calc(100vw - 32px));
      padding: 28px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 22px;
      background: rgba(255,255,255,.075);
      box-shadow: 0 24px 80px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 10px; font-size: 28px; letter-spacing: -.04em; }
    p { margin: 0; color: #aab6d3; line-height: 1.5; }
  </style>
</head>
<body>
  <main class="loader">
    <h1>Загружаю тренажёр…</h1>
    <p>Подтягиваю билеты и включаю подсветку синтаксиса C#.</p>
  </main>

  <script>
    const REPO = 'Kureshik/oop-test';
    const BASE_INDEX_BLOB = '49dbc5c29f032523c6d5ef99e7bdc6fd75cd338e';

    const HIGHLIGHT_STYLE = String.raw`
      .code-block { position: relative; }
      code.language-csharp { white-space: pre; tab-size: 4; }
      .tok-keyword { color: #c084fc; font-weight: 700; }
      .tok-type { color: #67e8f9; }
      .tok-string { color: #86efac; }
      .tok-number { color: #fbbf24; }
      .tok-comment { color: #94a3b8; font-style: italic; }
      .tok-attr { color: #f0abfc; }
      @media print {
        code.language-csharp span { color: inherit !important; font-weight: inherit !important; font-style: inherit !important; }
      }
    `;

    const HIGHLIGHT_SCRIPT = String.raw`
      (() => {
        const keywords = new Set([
          'abstract','as','base','bool','break','byte','case','catch','char','checked','class','const','continue',
          'decimal','default','delegate','do','double','else','enum','event','explicit','extern','false','finally',
          'fixed','float','for','foreach','goto','if','implicit','in','int','interface','internal','is','lock','long',
          'namespace','new','null','object','operator','out','override','params','private','protected','public',
          'readonly','ref','return','sbyte','sealed','short','sizeof','stackalloc','static','string','struct','switch',
          'this','throw','true','try','typeof','uint','ulong','unchecked','unsafe','ushort','using','var','virtual',
          'void','volatile','while','async','await','yield','record','init','required','not','and','or'
        ]);

        function escapeHtml(value) {
          return String(value).replace(/[&<>"']/g, ch => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
          }[ch]));
        }

        function token(className, value) {
          return '<span class="' + className + '">' + escapeHtml(value) + '</span>';
        }

        function highlightCSharp(source) {
          let result = '';
          let i = 0;

          while (i < source.length) {
            const rest = source.slice(i);

            if (rest.startsWith('//')) {
              const end = source.indexOf('\n', i);
              const value = source.slice(i, end === -1 ? source.length : end);
              result += token('tok-comment', value);
              i += value.length;
              continue;
            }

            if (rest.startsWith('/*')) {
              const end = source.indexOf('*/', i + 2);
              const value = source.slice(i, end === -1 ? source.length : end + 2);
              result += token('tok-comment', value);
              i += value.length;
              continue;
            }

            const verbatim = rest.match(/^\$?@"|^@\$"/);
            if (verbatim) {
              let j = i + verbatim[0].length;
              while (j < source.length) {
                if (source[j] === '"' && source[j + 1] === '"') { j += 2; continue; }
                if (source[j] === '"') { j++; break; }
                j++;
              }
              result += token('tok-string', source.slice(i, j));
              i = j;
              continue;
            }

            const normalString = rest.match(/^\$?"/);
            if (normalString) {
              let j = i + normalString[0].length;
              while (j < source.length) {
                if (source[j] === '\\') { j += 2; continue; }
                if (source[j] === '"') { j++; break; }
                j++;
              }
              result += token('tok-string', source.slice(i, j));
              i = j;
              continue;
            }

            if (source[i] === "'") {
              let j = i + 1;
              while (j < source.length) {
                if (source[j] === '\\') { j += 2; continue; }
                if (source[j] === "'") { j++; break; }
                j++;
              }
              result += token('tok-string', source.slice(i, j));
              i = j;
              continue;
            }

            const attr = rest.match(/^\[[A-Za-z_][A-Za-z0-9_]*(?:Attribute)?\]/);
            if (attr) {
              result += token('tok-attr', attr[0]);
              i += attr[0].length;
              continue;
            }

            const number = rest.match(/^\b\d[\d_]*(?:\.\d[\d_]*)?(?:[eE][+-]?\d[\d_]*)?[mMdDfFlLuU]*\b/);
            if (number) {
              result += token('tok-number', number[0]);
              i += number[0].length;
              continue;
            }

            const ident = rest.match(/^@?[A-Za-z_][A-Za-z0-9_]*/);
            if (ident) {
              const raw = ident[0];
              const normalized = raw.startsWith('@') ? raw.slice(1) : raw;
              if (keywords.has(normalized)) result += token('tok-keyword', raw);
              else if (/^[A-Z]/.test(normalized)) result += token('tok-type', raw);
              else result += escapeHtml(raw);
              i += raw.length;
              continue;
            }

            result += escapeHtml(source[i]);
            i++;
          }

          return result;
        }

        function highlightCodeBlocks() {
          document.querySelectorAll('pre code:not([data-highlighted])').forEach(code => {
            code.classList.add('language-csharp');
            code.parentElement.classList.add('code-block');
            code.innerHTML = highlightCSharp(code.textContent);
            code.dataset.highlighted = 'true';
          });
        }

        const observer = new MutationObserver(() => requestAnimationFrame(highlightCodeBlocks));
        observer.observe(document.body, { childList: true, subtree: true });
        requestAnimationFrame(highlightCodeBlocks);
      })();
    `;

    function decodeBase64Utf8(base64) {
      const binary = atob(base64.replace(/\s/g, ''));
      const bytes = Uint8Array.from(binary, ch => ch.charCodeAt(0));
      return new TextDecoder('utf-8').decode(bytes);
    }

    async function loadTrainer() {
      const response = await fetch(`https://api.github.com/repos/${REPO}/git/blobs/${BASE_INDEX_BLOB}`);
      if (!response.ok) throw new Error(`GitHub API вернул ${response.status}`);

      const blob = await response.json();
      const baseHtml = decodeBase64Utf8(blob.content);
      const closeScript = '</scr' + 'ipt>';
      const openScript = '<scr' + 'ipt>';
      const safeScript = HIGHLIGHT_SCRIPT.replace(/<\/script/gi, '<\\/script');

      let html = baseHtml.replace('</style>', `${HIGHLIGHT_STYLE}\n  </style>`);
      html = html.replace('</body>', `${openScript}\n${safeScript}\n${closeScript}\n</body>`);

      document.open();
      document.write(html);
      document.close();
    }

    loadTrainer().catch(error => {
      document.querySelector('.loader').innerHTML = `
        <h1>Не загрузилось</h1>
        <p>${error.message}. Обнови страницу или открой репозиторий напрямую.</p>
      `;
    });
  </script>
</body>
</html>
